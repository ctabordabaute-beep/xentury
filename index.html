<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xentury AI - Chat Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2f 100%);
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .login-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: slideUpFade 0.6s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header h2 {
            font-size: 2rem;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .input-group input::placeholder {
            color: #64748b;
        }

        .login-btn {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn i {
            font-size: 18px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .register-link {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
            cursor: pointer;
        }

        .register-link a:hover {
            color: #3b82f6;
        }

        /* Sidebar Styles */
        .sidebar {
            position: fixed;
            left: -320px;
            top: 0;
            width: 320px;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            transition: left 0.3s ease;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h3 {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .close-sidebar {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: transform 0.3s;
        }

        .close-sidebar:hover {
            transform: scale(1.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .user-details {
            flex: 1;
        }

        .user-details h4 {
            color: #fff;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .user-details p {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .user-details p i {
            margin-right: 4px;
            font-size: 12px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .history-header h4 {
            color: #fff;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clear-all-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .clear-all-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .history-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
            position: relative;
            group: true;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
        }

        .history-item-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item-text {
            flex: 1;
        }

        .history-item-text p {
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-text small {
            color: #60a5fa;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .delete-chat-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 14px;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            opacity: 0;
            transition: all 0.3s;
        }

        .history-item:hover .delete-chat-btn {
            opacity: 1;
        }

        .delete-chat-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ef4444;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
        }

        /* Main Container */
        .chat-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: transparent;
            margin-left: 0;
            transition: margin-left 0.3s ease;
        }

        .chat-container.shifted {
            margin-left: 320px;
        }

        /* Header */
        .chat-header {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: transform 0.3s;
        }

        .menu-toggle:hover {
            transform: scale(1.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 32px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 2s infinite;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo span {
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 400;
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .message {
            display: flex;
            margin-bottom: 25px;
            animation: fadeIn 0.5s ease;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        .message-content img, .message-content .file-attachment {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }

        .file-attachment {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
        }

        .user .message-content {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .ai .message-content {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-bottom-left-radius: 5px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
            font-size: 18px;
        }

        .user .avatar {
            margin-left: 15px;
            margin-right: 0;
            order: 2;
            background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%);
        }

        /* Typing animation */
        .typing {
            display: inline-block;
            position: relative;
        }

        .typing::after {
            content: '|';
            animation: blink 0.7s infinite;
            margin-left: 2px;
            color: #60a5fa;
        }

        /* Input Area */
        .input-area {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-container {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .input-container:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        textarea {
            flex: 1;
            border: none;
            background: transparent;
            padding: 15px 20px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            resize: none;
            outline: none;
            color: #fff;
        }

        textarea::placeholder {
            color: #64748b;
        }

        .attach-button {
            width: 45px;
            height: 45px;
            border: none;
            background: transparent;
            color: #60a5fa;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s;
            position: relative;
        }

        .attach-button:hover {
            background: rgba(96, 165, 250, 0.1);
        }

        .file-input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .send-button {
            width: 45px;
            height: 45px;
            border: none;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s;
        }

        .send-button:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.5);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Loading indicator */
        .loading {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            width: fit-content;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            border-radius: 4px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 3000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast i {
            font-size: 20px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                left: -100%;
            }
            
            .chat-container.shifted {
                margin-left: 0;
            }
            
            .message-content {
                max-width: 85%;
            }

            .login-container {
                margin: 20px;
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-container">
            <div class="login-header">
                <i class="fas fa-robot login-logo"></i>
                <h2>Xentury AI</h2>
                <p><i class="fas fa-shield-alt"></i> Acceso seguro</p>
            </div>
            
            <div class="login-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="loginNombre" placeholder="Nombre completo">
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Correo electrónico">
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Contraseña">
                </div>
                
                <button class="login-btn" onclick="login()">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
                
                <div class="register-link">
                    <i class="fas fa-user-plus"></i> ¿No tienes cuenta? <a onclick="showRegister()">Regístrate</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Register Modal (hidden by default) -->
    <div class="login-screen" id="registerScreen" style="display: none;">
        <div class="login-container">
            <div class="login-header">
                <i class="fas fa-robot login-logo"></i>
                <h2>Crear Cuenta</h2>
                <p><i class="fas fa-shield-alt"></i> Registro seguro</p>
            </div>
            
            <div class="login-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regNombre" placeholder="Nombre completo">
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="Correo electrónico">
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="Contraseña">
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regConfirmPassword" placeholder="Confirmar contraseña">
                </div>
                
                <button class="login-btn" onclick="register()">
                    <i class="fas fa-user-plus"></i> Registrarse
                </button>
                
                <div class="register-link">
                    <i class="fas fa-arrow-left"></i> <a onclick="showLogin()">Volver al inicio de sesión</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-history"></i> Historial</h3>
            <button class="close-sidebar" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="user-info" id="userInfo">
            <!-- Se llena dinámicamente -->
        </div>
        
        <div class="history-header">
            <h4><i class="fas fa-comments"></i> Conversaciones</h4>
            <button class="clear-all-btn" onclick="clearAllHistory()" title="Eliminar todo">
                <i class="fas fa-trash-alt"></i>
            </button>
        </div>
        
        <div id="historyList">
            <!-- Los items del historial se agregarán dinámicamente -->
        </div>
        
        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </button>
    </div>

    <!-- Main Chat Container -->
    <div class="chat-container" id="chatContainer">
        <!-- Header -->
        <div class="chat-header">
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="logo">
                <i class="fas fa-robot logo-icon"></i>
                <div>
                    <h1>Xentury AI</h1>
                    <span><i class="fas fa-microchip"></i> Impulsado por Xentury 2.1</span>
                </div>
            </div>
        </div>

        <!-- Messages Area -->
        <div class="messages-area" id="messagesArea">
            <!-- Los mensajes se agregarán dinámicamente -->
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-container">
                <button class="attach-button" id="attachButton">
                    <i class="fas fa-paperclip"></i>
                    <input type="file" id="fileInput" class="file-input" multiple onchange="handleFileUpload(this.files)">
                </button>
                <textarea 
                    id="userInput" 
                    placeholder="Escribe tu mensaje..." 
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button class="send-button" id="sendButton" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <script>
        const API_KEY = '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';
        const API_URL = 'https://api.groq.com/openai/v1/chat/completions';
        
        let isTyping = false;
        let currentUser = null;
        let currentChat = [];
        let users = JSON.parse(localStorage.getItem('users')) || {};

        // Usuario por defecto para pruebas
        if (Object.keys(users).length === 0) {
            users['admin@xentury.com'] = {
                nombre: 'Administrador',
                email: 'admin@xentury.com',
                password: 'admin123',
                history: []
            };
            localStorage.setItem('users', JSON.stringify(users));
        }

        // Elementos del DOM
        const loginScreen = document.getElementById('loginScreen');
        const registerScreen = document.getElementById('registerScreen');
        const sidebar = document.getElementById('sidebar');
        const chatContainer = document.getElementById('chatContainer');
        const messagesArea = document.getElementById('messagesArea');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        const historyList = document.getElementById('historyList');
        const userInfo = document.getElementById('userInfo');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        function showToast(message, icon = 'check-circle') {
            toastMessage.textContent = message;
            toast.querySelector('i').className = `fas fa-${icon}`;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function showRegister() {
            loginScreen.style.display = 'none';
            registerScreen.style.display = 'flex';
        }

        function showLogin() {
            registerScreen.style.display = 'none';
            loginScreen.style.display = 'flex';
        }

        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            users = JSON.parse(localStorage.getItem('users')) || {};
            
            if (users[email] && users[email].password === password) {
                currentUser = users[email];
                currentUser.email = email;
                loginScreen.style.display = 'none';
                updateUserInfo();
                loadUserHistory();
                messagesArea.innerHTML = '';
                addMessage('¡Hola! Soy Xentury AI, tu asistente inteligente. ¿En qué puedo ayudarte hoy?', 'ai');
                showToast(`Bienvenido ${currentUser.nombre}`, 'user-check');
            } else {
                alert('Credenciales incorrectas');
            }
        }

        function register() {
            const nombre = document.getElementById('regNombre').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            if (!nombre || !email || !password) {
                alert('Por favor completa todos los campos');
                return;
            }

            if (password !== confirmPassword) {
                alert('Las contraseñas no coinciden');
                return;
            }
            
            users = JSON.parse(localStorage.getItem('users')) || {};
            
            if (users[email]) {
                alert('El correo ya está registrado');
                return;
            }
            
            users[email] = {
                nombre: nombre,
                email: email,
                password: password,
                history: []
            };
            
            localStorage.setItem('users', JSON.stringify(users));
            showToast('Registro exitoso. Ahora puedes iniciar sesión', 'user-plus');
            showLogin();
        }

        function logout() {
            currentUser = null;
            currentChat = [];
            messagesArea.innerHTML = '';
            loginScreen.style.display = 'flex';
            registerScreen.style.display = 'none';
            toggleSidebar();
            showToast('Sesión cerrada', 'power-off');
        }

        function updateUserInfo() {
            if (currentUser) {
                userInfo.innerHTML = `
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="user-details">
                        <h4>${currentUser.nombre}</h4>
                        <p><i class="fas fa-envelope"></i> ${currentUser.email}</p>
                    </div>
                `;
            }
        }

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            chatContainer.classList.toggle('shifted');
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function handleFileUpload(files) {
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (file.type.startsWith('image/')) {
                        addImageMessage(e.target.result, 'user');
                    } else {
                        addFileMessage(file.name, 'user');
                    }
                };
                reader.readAsDataURL(file);
            }
            showToast(`${files.length} archivo(s) adjuntado(s)`, 'paperclip');
        }

        function addImageMessage(imageData, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = sender === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = `<img src="${imageData}" alt="Imagen" style="max-width: 100%; max-height: 300px; border-radius: 8px;">`;
            
            if (sender === 'user') {
                messageDiv.appendChild(contentDiv);
                messageDiv.appendChild(avatar);
            } else {
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(contentDiv);
            }
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function addFileMessage(fileName, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = sender === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = `
                <div class="file-attachment" onclick="window.open(this.dataset.file)">
                    <i class="fas fa-file-alt"></i>
                    <span>${fileName}</span>
                    <i class="fas fa-download"></i>
                </div>
            `;
            
            if (sender === 'user') {
                messageDiv.appendChild(contentDiv);
                messageDiv.appendChild(avatar);
            } else {
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(contentDiv);
            }
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || isTyping || !currentUser) return;

            addMessage(message, 'user');
            userInput.value = '';
            autoResizeTextarea();

            showTypingIndicator();

            try {
                const response = await getAIResponse(message);
                hideTypingIndicator();
                await typeMessage(response);
                
                saveToHistory(message, response);
            } catch (error) {
                hideTypingIndicator();
                addMessage('Lo siento, hubo un error al procesar tu mensaje. Por favor, intenta de nuevo.', 'ai');
                console.error('Error:', error);
            }
        }

        function addMessage(content, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = sender === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            if (sender === 'user') {
                messageDiv.appendChild(contentDiv);
                messageDiv.appendChild(avatar);
            } else {
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(contentDiv);
            }
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            
            currentChat.push({ role: sender === 'user' ? 'user' : 'assistant', content });
        }

        function showTypingIndicator() {
            isTyping = true;
            sendButton.disabled = true;
            
            const indicator = document.createElement('div');
            indicator.className = 'message ai';
            indicator.id = 'typingIndicator';
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = '<i class="fas fa-robot"></i>';
            
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.innerHTML = '<span></span><span></span><span></span>';
            
            indicator.appendChild(avatar);
            indicator.appendChild(loadingDiv);
            
            messagesArea.appendChild(indicator);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
            isTyping = false;
            sendButton.disabled = false;
        }

        async function typeMessage(message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = '<i class="fas fa-robot"></i>';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.id = 'typingMessage';
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messagesArea.appendChild(messageDiv);
            
            for (let i = 0; i <= message.length; i++) {
                contentDiv.textContent = message.substring(0, i);
                contentDiv.classList.add('typing');
                messagesArea.scrollTop = messagesArea.scrollHeight;
                await new Promise(resolve => setTimeout(resolve, 30));
            }
            
            contentDiv.classList.remove('typing');
            currentChat.push({ role: 'assistant', content: message });
        }

        async function getAIResponse(userMessage) {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'llama-3.1-8b-instant',
                    messages: [
                        { role: 'system', content: 'Eres Xentury AI, un asistente amigable y útil, responde corto y breve.' },
                        ...currentChat,
                        { role: 'user', content: userMessage }
                    ],
                    temperature: 0.7,
                    max_tokens: 1024
                })
            });

            if (!response.ok) {
                throw new Error('Error en la API');
            }

            const data = await response.json();
            return data.choices[0].message.content;
        }

        function saveToHistory(userMessage, aiResponse) {
            if (!currentUser) return;
            
            const chatItem = {
                id: Date.now(),
                timestamp: new Date().toLocaleString(),
                userMessage: userMessage.substring(0, 50) + (userMessage.length > 50 ? '...' : ''),
                fullChat: [...currentChat]
            };
            
            users[currentUser.email].history.unshift(chatItem);
            
            if (users[currentUser.email].history.length > 50) {
                users[currentUser.email].history.pop();
            }
            
            localStorage.setItem('users', JSON.stringify(users));
            loadUserHistory();
        }

        function loadUserHistory() {
            if (!currentUser) return;
            
            historyList.innerHTML = '';
            
            const userHistory = users[currentUser.email].history || [];
            
            if (userHistory.length === 0) {
                historyList.innerHTML = '<div class="history-item"><div class="history-item-text"><p><i class="fas fa-inbox"></i> No hay historial disponible</p></div></div>';
                return;
            }
            
            userHistory.forEach(item => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                
                historyItem.innerHTML = `
                    <div class="history-item-content">
                        <div class="history-item-text" onclick="loadChat(${item.id})">
                            <p><i class="fas fa-message"></i> ${item.userMessage}</p>
                            <small><i class="far fa-clock"></i> ${item.timestamp}</small>
                        </div>
                        <button class="delete-chat-btn" onclick="deleteChat(${item.id}, event)">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                
                historyList.appendChild(historyItem);
            });
        }

        function loadChat(chatId) {
            if (!currentUser) return;
            
            const chat = users[currentUser.email].history.find(item => item.id === chatId);
            
            if (chat) {
                currentChat = chat.fullChat || [];
                messagesArea.innerHTML = '';
                
                currentChat.forEach(msg => {
                    addMessage(msg.content, msg.role === 'user' ? 'user' : 'ai');
                });
                showToast('Conversación cargada', 'folder-open');
            }
            
            toggleSidebar();
        }

        function deleteChat(chatId, event) {
            event.stopPropagation();
            
            if (!currentUser) return;
            
            users[currentUser.email].history = users[currentUser.email].history.filter(item => item.id !== chatId);
            localStorage.setItem('users', JSON.stringify(users));
            loadUserHistory();
            showToast('Chat eliminado', 'trash-alt');
        }

        function clearAllHistory() {
            if (!currentUser) return;
            
            if (confirm('¿Eliminar todo el historial?')) {
                users[currentUser.email].history = [];
                localStorage.setItem('users', JSON.stringify(users));
                loadUserHistory();
                showToast('Historial eliminado', 'trash-alt');
            }
        }

        function autoResizeTextarea() {
            userInput.style.height = 'auto';
            userInput.style.height = userInput.scrollHeight + 'px';
        }

        userInput.addEventListener('input', autoResizeTextarea);

        // Inicializar
        autoResizeTextarea();
    </script>
</body>
</html>
